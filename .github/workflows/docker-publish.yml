# =============================================================================
# Docker Publish — Build and push images on release
# =============================================================================
# Triggered when a GitHub Release is published. Builds all service images
# and pushes them to GitHub Container Registry (ghcr.io).
#
# Images produced:
#   ghcr.io/${{ github.repository }}/backend:latest
#   ghcr.io/${{ github.repository }}/backend:${{ tag }}
#   ghcr.io/${{ github.repository }}/frontend:latest
#   ghcr.io/${{ github.repository }}/frontend:${{ tag }}
#   ghcr.io/${{ github.repository }}/frontend-prod:latest
#   ghcr.io/${{ github.repository }}/frontend-prod:${{ tag }}
# =============================================================================

name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to 'latest' for manual runs)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile
          - name: frontend-prod
            dockerfile: frontend/Dockerfile.prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag || 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
